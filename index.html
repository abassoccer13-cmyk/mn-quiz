<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MN Standards Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:'Nunito',sans-serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;min-height:100vh}
@keyframes pop{0%{transform:scale(.85);opacity:0}80%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
.shake{animation:shake .4s ease}
.bounce{animation:bounce .7s ease infinite}
.fadeup{animation:fadeup .4s ease both}
.spin{animation:spin 1.5s linear infinite;display:inline-block}
input,button,select,textarea{font-family:'Nunito',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useCallback,createElement:h}=React;

/* ─── Parse quiz config from URL hash or query param ─── */
function parseConfig(){
  try{
    var hash=window.location.hash.replace('#','');
    var search=window.location.search;
    var q=null;
    if(hash) q=hash;
    else{
      var m=search.match(/[?&]q=([^&]+)/);
      if(m) q=m[1];
    }
    if(!q) return null;
    var json=decodeURIComponent(escape(atob(q)));
    return JSON.parse(json);
  } catch(e){ return null; }
}

/* ─── Completion code encoder ─── */
function makeCode(studentName, standardCode, pct){
  var raw=studentName+'|'+standardCode+'|'+pct+'|'+Date.now();
  return btoa(unescape(encodeURIComponent(raw))).replace(/=/g,'').slice(0,20).toUpperCase();
}

/* ─── Main App ─── */
function App(){
  var cfg=parseConfig();

  var [screen,setScreen]=useState(cfg?'loading':'noconfig');
  var [name,setName]=useState(cfg?cfg.n||'':'');
  var [questions,setQuestions]=useState([]);
  var [cur,setCur]=useState(0);
  var [selected,setSelected]=useState(null);
  var [answered,setAnswered]=useState(false);
  var [correct,setCorrect]=useState(false);
  var [results,setResults]=useState([]);
  var [shake,setShake]=useState(false);
  var [err,setErr]=useState('');
  var [code,setCode]=useState('');

  var std=cfg||{};
  var gradeLabel=std.g==='K'?'Kindergarten':(std.g||'4')+'th';

  /* Auto-start if config present */
  useEffect(function(){
    if(cfg&&cfg.c&&cfg.n){
      startQuiz();
    } else if(cfg){
      setScreen('enterName');
    }
  },[]);

  function startQuiz(){
    var nm=name.trim()||cfg.n||'Student';
    setScreen('loading');setErr('');
    var subj=std.s==='math'?'Mathematics':'English Language Arts';
    var pr='You are creating a fun quiz for a '+gradeLabel+' grade student named '+nm+'.\n\n'+
           'Standard: '+std.c+' — '+std.t+'\nDescription: '+(std.d||'')+'\nSubject: '+subj+'\nGrade: '+gradeLabel+'\n\n'+
           'Create EXACTLY 5 multiple-choice questions with 4 choices each (ONE correct answer).\n'+
           'Respond with ONLY valid JSON — no markdown, no backticks:\n'+
           '[{"question":"...","choices":["A","B","C","D"],"correct":0,"explanation":"Brief friendly explanation."}]\n\n'+
           'Rules: grade-appropriate for '+gradeLabel+', use real-world contexts (animals, food, sports, games), '+
           'vary correct answer position (0,1,2,3). Plain JSON only.';

    var fetchP=fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:pr}]})
    }).then(function(r){
      return r.json().then(function(data){
        if(!r.ok) return Promise.reject(new Error(data&&data.error&&data.error.message||'HTTP '+r.status));
        return data;
      });
    });
    var timeoutP=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},60000);});

    Promise.race([fetchP,timeoutP])
      .then(function(data){
        var text=(data.content||[]).map(function(c){return c.text||'';}).join('\n');
        var clean=text.replace(/```json|```/g,'').trim();
        var parsed=JSON.parse(clean);
        if(!Array.isArray(parsed)||parsed.length<3) throw new Error('bad format');
        setQuestions(parsed.slice(0,5));
        setCur(0);setSelected(null);setAnswered(false);setResults([]);
        setScreen('quiz');
      })
      .catch(function(e){
        var msg=e&&e.message||'';
        if(msg==='timeout') setErr('Taking too long. Please try again.');
        else setErr('Could not load questions. Check your connection and try again.');
        setScreen('err');
      });
  }

  function pickAnswer(idx){
    if(answered) return;
    setSelected(idx);setAnswered(true);
    var isCorrect=idx===questions[cur].correct;
    setCorrect(isCorrect);
    if(!isCorrect){setShake(true);setTimeout(function(){setShake(false);},500);}
    var newR=results.concat([{q:questions[cur].question,sel:idx,correct:questions[cur].correct,ok:isCorrect}]);
    setResults(newR);
    if(cur+1>=questions.length){
      /* Build completion code */
      var sc=Math.round(100*newR.filter(function(r){return r.ok;}).length/newR.length);
      setCode(makeCode(name.trim()||cfg.n||'Student',std.c,sc));
    }
  }

  function next(){
    if(cur+1>=questions.length) setScreen('results');
    else{setCur(function(c){return c+1;});setSelected(null);setAnswered(false);setCorrect(false);}
  }

  var score=results.filter(function(r){return r.ok;}).length;
  var pct=questions.length?Math.round(100*score/questions.length):0;
  var gColor=pct>=90?'#059669':pct>=75?'#2563eb':pct>=60?'#d97706':'#dc2626';
  var gLabel=pct>=90?'Advanced ⭐':pct>=75?'Proficient 💪':pct>=60?'Developing 📈':'Keep Practicing 🌱';
  var nm=name.trim()||cfg&&cfg.n||'Student';
  var LABELS=['A','B','C','D'];

  var CARD={background:'white',borderRadius:20,padding:24,boxShadow:'0 8px 32px rgba(0,0,0,.2)',
            width:'100%',maxWidth:620,marginTop:12};

  /* ── NO CONFIG ── */
  if(screen==='noconfig') return h('div',{style:{...CARD,textAlign:'center',padding:40}},
    h('div',{style:{fontSize:56,marginBottom:12}},'🎓'),
    h('div',{style:{fontFamily:"'Fredoka One'",fontSize:22,color:'#4f46e5',marginBottom:8}},'MN Standards Quiz'),
    h('div',{style:{fontSize:14,color:'#6b7280',lineHeight:1.7}},
      'This quiz is opened via a link from your teacher.',h('br',null),
      'Ask your teacher to share the quiz link with you.')
  );

  /* ── ENTER NAME (if config has no name) ── */
  if(screen==='enterName') return h('div',{style:{...CARD,textAlign:'center'}},
    h('div',{className:'bounce',style:{fontSize:56,marginBottom:8}},'🎓'),
    h('div',{style:{fontFamily:"'Fredoka One'",fontSize:26,color:'#4f46e5',marginBottom:6}},gradeLabel+' Grade Quiz!'),
    h('div',{style:{fontSize:13,color:'#6b7280',marginBottom:20,lineHeight:1.6}},
      'Quiz: ',h('b',null,std.t)),
    h('input',{value:name,onChange:function(e){setName(e.target.value);},
      onKeyDown:function(e){if(e.key==='Enter'&&name.trim())startQuiz();},
      placeholder:"What's your name?",autoFocus:true,
      style:{width:'100%',border:'3px solid #e0e7ff',borderRadius:14,padding:'13px 16px',
             fontSize:17,fontWeight:700,textAlign:'center',outline:'none',marginBottom:14,color:'#312e81'}}),
    h('button',{onClick:function(){if(name.trim())startQuiz();},disabled:!name.trim(),
      style:{width:'100%',background:name.trim()?'linear-gradient(135deg,#6366f1,#8b5cf6)':'#e5e7eb',
             color:name.trim()?'white':'#9ca3af',border:'none',borderRadius:14,padding:'14px',
             fontSize:17,fontWeight:900,cursor:name.trim()?'pointer':'not-allowed'}},"Let's Go! 🚀")
  );

  /* ── LOADING ── */
  if(screen==='loading') return h('div',{style:{...CARD,textAlign:'center',padding:48}},
    h('div',{className:'spin',style:{fontSize:52,display:'block',marginBottom:16}},'🎲'),
    h('div',{style:{fontFamily:"'Fredoka One'",fontSize:22,color:'#4f46e5',marginBottom:6}},'Building Your Quiz…'),
    h('div',{style:{fontSize:13,color:'#6b7280',marginBottom:4}},'Questions for: ',h('b',null,std.t)),
    h('div',{style:{fontSize:12,color:'#9ca3af'}},'This takes about 10-20 seconds ✨')
  );

  /* ── ERROR ── */
  if(screen==='err') return h('div',{style:{...CARD,textAlign:'center',padding:40}},
    h('div',{style:{fontSize:52,marginBottom:12}},'😕'),
    h('div',{style:{fontFamily:"'Fredoka One'",fontSize:20,color:'#dc2626',marginBottom:8}},'Oops!'),
    h('div',{style:{fontSize:14,color:'#6b7280',marginBottom:20,lineHeight:1.6}},err),
    h('button',{onClick:startQuiz,
      style:{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',
             borderRadius:14,padding:'12px 28px',fontSize:15,fontWeight:900,cursor:'pointer'}},
      'Try Again 🔄')
  );

  /* ── QUIZ ── */
  if(screen==='quiz'&&questions.length){
    var q=questions[cur];
    var prog=((cur+1)/questions.length)*100;
    return h('div',{style:CARD},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'#6b7280'}},'Question '+(cur+1)+' of '+questions.length),
        h('div',{style:{fontSize:12,fontWeight:700,color:'#6b7280'}},
          h('span',{style:{color:'#059669',fontWeight:800}},results.filter(function(r){return r.ok;}).length),
          ' correct')
      ),
      h('div',{style:{background:'#e0e7ff',borderRadius:99,height:9,marginBottom:18,overflow:'hidden'}},
        h('div',{style:{background:'linear-gradient(90deg,#6366f1,#8b5cf6)',height:'100%',
                        borderRadius:99,width:prog+'%',transition:'width .4s ease'}})
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:14}},
        h('span',{style:{background:'#eef2ff',color:'#4f46e5',fontSize:10,fontWeight:800,
                         padding:'2px 8px',borderRadius:99}},std.c),
        h('span',{style:{fontSize:11,color:'#9ca3af',fontWeight:600}},std.t)
      ),
      h('div',{className:shake?'shake':'',
               style:{background:'linear-gradient(135deg,#eef2ff,#faf5ff)',borderRadius:13,
                      padding:'18px 20px',marginBottom:18,border:'2px solid #e0e7ff'}},
        h('div',{style:{fontWeight:800,fontSize:17,color:'#1e1b4b',lineHeight:1.55}},q.question)
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:9,marginBottom:18}},
        q.choices.map(function(choice,i){
          var bg='#f9fafb',border='2px solid #e5e7eb',col='#374151';
          if(answered){
            if(i===q.correct){bg='#f0fdf4';border='2px solid #6ee7b7';col='#059669';}
            else if(i===selected&&!correct){bg='#fef2f2';border='2px solid #fca5a5';col='#dc2626';}
          }
          return h('button',{key:i,onClick:function(){pickAnswer(i);},disabled:answered,
            style:{display:'flex',alignItems:'center',gap:12,textAlign:'left',background:bg,
                   border:border,borderRadius:11,padding:'13px 15px',cursor:answered?'default':'pointer',
                   color:col,fontWeight:700,fontSize:14,transition:'all .2s',fontFamily:'inherit'}},
            h('div',{style:{width:30,height:30,borderRadius:'50%',flexShrink:0,
                            display:'flex',alignItems:'center',justifyContent:'center',
                            fontWeight:900,fontSize:13,color:'white',
                            background:answered&&i===q.correct?'#059669':
                                       answered&&i===selected&&!correct?'#dc2626':
                                       'linear-gradient(135deg,#6366f1,#8b5cf6)'}},
              answered&&i===q.correct?'✓':answered&&i===selected&&!correct?'✗':LABELS[i]
            ),
            choice
          );
        })
      ),
      answered&&h('div',{className:'fadeup',
                         style:{background:correct?'#f0fdf4':'#fef2f2',
                                border:'2px solid '+(correct?'#6ee7b7':'#fca5a5'),
                                borderRadius:11,padding:'13px 15px',marginBottom:14}},
        h('div',{style:{fontWeight:800,fontSize:15,color:correct?'#059669':'#dc2626',marginBottom:3}},
          correct?'🎉 Correct! Great job, '+nm+'!':'😊 Not quite — here\'s the answer:'),
        h('div',{style:{fontSize:12,color:'#374151',lineHeight:1.6}},q.explanation)
      ),
      answered&&h('button',{className:'pop',onClick:next,
        style:{width:'100%',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',
               border:'none',borderRadius:13,padding:'14px',fontSize:16,fontWeight:900,
               cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 14px rgba(99,102,241,.45)'}},
        cur+1>=questions.length?'See My Results! 🏆':'Next Question →')
    );
  }

  /* ── RESULTS ── */
  if(screen==='results') return h('div',{style:{...CARD,textAlign:'center'}},
    h('div',{style:{fontSize:72,marginBottom:8}},pct>=90?'🏆':pct>=75?'⭐':'💪'),
    h('div',{style:{fontFamily:"'Fredoka One'",fontSize:26,color:'#312e81',marginBottom:8}},
      nm+"'s Results!"),
    /* Big score bubble */
    h('div',{style:{background:gColor,borderRadius:24,padding:'24px 40px',display:'inline-block',
                    marginBottom:16,boxShadow:'0 8px 24px rgba(0,0,0,.18)'}},
      h('div',{style:{fontSize:72,fontWeight:900,color:'white',lineHeight:1}},pct+'%'),
      h('div',{style:{fontSize:18,fontWeight:800,color:'rgba(255,255,255,.9)',marginTop:4}},gLabel)
    ),
    h('div',{style:{fontSize:14,fontWeight:700,color:'#6b7280',marginBottom:20}},
      score+' out of '+questions.length+' correct · '+std.c),

    /* Completion code for teacher */
    h('div',{style:{background:'#fefce8',border:'3px solid #fde047',borderRadius:16,
                    padding:'20px',marginBottom:20}},
      h('div',{style:{fontWeight:900,fontSize:14,color:'#713f12',marginBottom:8}},
        '📋 Show this to your teacher!'),
      h('div',{style:{fontFamily:'monospace',fontSize:18,fontWeight:900,
                      background:'white',border:'2px solid #fde047',borderRadius:8,
                      padding:'10px 16px',color:'#1a1a2e',letterSpacing:'2px',marginBottom:8}},
        code),
      h('div',{style:{fontSize:11,color:'#92400e'}},
        'Your teacher will enter this code to save your score.')
    ),

    /* Review */
    h('div',{style:{textAlign:'left',marginBottom:20}},
      h('div',{style:{fontWeight:800,fontSize:13,color:'#374151',marginBottom:8}},'📋 Review'),
      results.map(function(r,i){
        return h('div',{key:i,style:{display:'flex',alignItems:'flex-start',gap:10,
                                     padding:'10px 12px',borderRadius:10,marginBottom:7,
                                     background:r.ok?'#f0fdf4':'#fef2f2',
                                     border:'1.5px solid '+(r.ok?'#a7f3d0':'#fca5a5')}},
          h('span',{style:{fontSize:16,flexShrink:0}},r.ok?'✅':'❌'),
          h('div',{style:{fontSize:12,color:'#374151',lineHeight:1.4}},
            r.q.length>70?r.q.slice(0,70)+'…':r.q)
        );
      })
    ),
    h('div',{style:{background:'linear-gradient(135deg,#6366f1,#8b5cf6)',borderRadius:14,
                    padding:'16px',color:'white',fontWeight:900,fontSize:18}},
      '🎓 Quiz Complete! Amazing work, '+nm+'! 🎉')
  );

  return null;
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
